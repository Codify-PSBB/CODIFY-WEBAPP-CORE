<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="#0f172a" />
    <link rel="icon" type="image/png" href="/codify-logo.png" />
    <link rel="shortcut icon" type="image/png" href="/codify-logo.png" />
    <link rel="apple-touch-icon" href="/codify-logo.png" />
    <meta property="og:image" content="/codify-logo.png" />
    <meta name="twitter:image" content="/codify-logo.png" />
    <title>Codify</title>
    <script>
      (() => {
        const storedTheme = window.localStorage.getItem("codify-theme");
        const theme = storedTheme === "dark" ? "dark" : "light";
        document.documentElement.classList.toggle("dark", theme === "dark");
        document.documentElement.style.colorScheme = theme;
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
